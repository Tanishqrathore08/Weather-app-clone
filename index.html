<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="ambient-glow"></div>

  <div class="app-shell">
    <header>
      <div class="header-text">
        <h1>Weather</h1>
        <p>Precision forecasts by Open-Meteo</p>
      </div>
      <form id="search-form">
        <div class="input-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="city-input" placeholder="Search a city..." aria-label="City name" required
            autocomplete="off" />
        </div>
        <button type="submit">Search</button>
      </form>
    </header>

    <main>
      <section id="status" role="status" aria-live="polite"></section>

      <section id="current" class="card hidden">
        <div class="card-inner-glow"></div>
        <div class="current-content">
          <div class="current-info">
            <p class="city" id="current-city"></p>
            <p class="description" id="current-description"></p>
          </div>
          <div class="temp-wrapper">
            <span id="current-temp"></span>
            <span id="temp-range"></span>
          </div>
        </div>
      </section>

      <section id="forecast" class="hidden">
        <div class="forecast-header">
          <h2>7-Day Forecast</h2>
        </div>
        <div id="forecast-grid"></div>
      </section>
    </main>
  </div>

  <template id="forecast-card-template">
    <article class="forecast-card">
      <p class="forecast-day"></p>
      <div class="forecast-icon-wrapper">
        <p class="forecast-icon" aria-hidden="true"></p>
      </div>
      <div class="forecast-temps">
        <span class="forecast-high"></span>
        <span class="forecast-low"></span>
      </div>
      <p class="forecast-precip"></p>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>

</html>
