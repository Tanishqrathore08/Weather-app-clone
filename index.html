<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div>
          <h1>Weather Now</h1>
          <p>Accurate 7-day forecasts powered by Open-Meteo</p>
        </div>
        <form id="search-form">
          <input
            type="text"
            id="city-input"
            placeholder="Enter a city (e.g., London)"
            aria-label="City name"
            required
          />
          <button type="submit">Search</button>
        </form>
      </header>

      <main>
        <section id="status" role="status" aria-live="polite"></section>

        <section id="current" class="card hidden">
          <h2>Current Conditions</h2>
          <div class="current-grid">
            <div>
              <p class="city" id="current-city"></p>
              <p id="current-description"></p>
            </div>
            <div class="temp">
              <span id="current-temp"></span>
              <span id="temp-range"></span>
            </div>
          </div>
        </section>

        <section id="forecast" class="hidden">
          <h2>7-Day Forecast</h2>
          <div id="forecast-grid"></div>
        </section>
      </main>
    </div>

    <template id="forecast-card-template">
      <article class="forecast-card">
        <p class="forecast-day"></p>
        <p class="forecast-icon" aria-hidden="true"></p>
        <p class="forecast-high"></p>
        <p class="forecast-low"></p>
        <p class="forecast-precip"></p>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
